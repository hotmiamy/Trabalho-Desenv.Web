<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Bracket Futebol</title>
  <link rel="stylesheet" href="css/styles_chaves.css">
</head>

<body>
  <main class="container">
    <!-- GRID -->
    <div class="bracket">

      <!-- Quartas -->
      <div class="match q1">
        <div class="team">Time A</div>
        <div class="team">Time B</div>
      </div>
      <div class="match q2">
        <div class="team">Time C</div>
        <div class="team">Time D</div>
      </div>
      <div class="match q3">
        <div class="team">Time E</div>
        <div class="team">Time F</div>
      </div>
      <div class="match q4">
        <div class="team">Time G</div>
        <div class="team">Time H</div>
      </div>

        <!-- Semis -->
      <div class="match s1">
        <div class="team">Time G</div>
        <div class="team">Time H</div>
      </div>
      <div class="match s2">
        <div class="team">Time G</div>
        <div class="team">Time H</div>
      </div>
    
        <!-- Final -->
      <div class="match f1">
        <div class="team">Time G</div>
        <div class="team">Time H</div>
      </div>
    </div>

      <!-- SVG (LINHAS) -->
      <svg class="lines">

          <!-- Q1 + Q2 -> S1 -->
          <line x1="260" y1="60"  x2="360" y2="120" stroke="white" stroke-width="2"/>
          <line x1="260" y1="240" x2="360" y2="120" stroke="white" stroke-width="2"/>
      
          <!-- Q3 + Q4 -> S2 -->
          <line x1="260" y1="450" x2="320" y2="540" stroke="white" stroke-width="2"/>
          <line x1="260" y1="650" x2="320" y2="540" stroke="white" stroke-width="2"/>
      
          <!-- S1 + S2 -> Final -->
          <line x1="580" y1="140" x2="660" y2="340" stroke="white" stroke-width="2"/>
          <line x1="580" y1="540" x2="660" y2="340" stroke="white" stroke-width="2"/>
      
      </svg>
    
  </main>
</body>

</html>
