<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Partidas</title>
  <link rel="stylesheet" href="css/styles_cadastro.css">
</head>

<body>

<header>CADASTRE AQUI SEUS TIMES ⚽</header>

<div class="container">
  <div class="card">

    <h1>Brasileirão 2026</h1>
    <h3>Cadastrar times</h3>

    <input type="text" id="teamInput" placeholder="Digite o nome do time">
    <button onclick="addTeam()">Adicionar</button>

    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="teamTable"></tbody>
    </table>

    <button class="btn" onclick="goNext()">Próxima página</button>

  </div>
</div>

<script>
  let editingRow = null;

  function addTeam() {
    const input = document.getElementById("teamInput");
    const teamName = input.value.trim();

    if (teamName === "") {
      alert("Digite um nome válido!");
      return;
    }

    const table = document.getElementById("teamTable");

    if (editingRow) {
      editingRow.querySelector(".team-name").innerText = teamName;
      editingRow = null;
    } else {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td class="team-name">${teamName}</td>
        <td>
          <span class="edit-btn" onclick="editTeam(this)">Editar</span> |
          <span class="delete-btn" onclick="deleteTeam(this)">Excluir</span>
        </td>
      `;

      table.appendChild(row);
    }

    input.value = "";
  }

  function deleteTeam(element) {
    const row = element.parentElement.parentElement;
  }

  function editTeam(element) {
    const row = element.parentElement.parentElement;
    const name = row.querySelector(".team-name").innerText;

    document.getElementById("teamInput").value = name;
    editingRow = row;
  }

  function goNext() {
    window.location.href = "chaves.html";
  }
</script>

<footer class="footer">
  <div class="left">Todos os direitos reservados ©</div>
  <div class="right">
    Devs: Bruno<br>
    Lucas<br>
    João<br>
  </div>
</footer>

</body>
</html>
