    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Partidas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}/* Header */
header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* Container */
.container {
  padding: 20px;
}
/* Card */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(78, 10, 238, 0.1);
  margin-bottom: 20px;
}

/* Inputs */
input {
 padding: 10px;
  margin: 5px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* Botões */
button {
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: white;
  }

.btn-save { background: #27ae60; }
.btn-edit { background: #f39c12; }
.btn-delete { background: #e74c3c; }

/* Tabela */
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  background: #34495e;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
tr:hover {
  background: #f1f1f1;
}
</style>
</head>

<body>

<header>Painel Administrativo ⚽</header>

<div class="container">
<div class="card">
    <h3>Cadastrar Partida</h3>
    <input type="text" id="timeA" placeholder="Time A">
    <input type="text" id="timeB" placeholder="Time B">
    <input type="date" id="data">
    <button class="btn-save" onclick="salvarPartida()">Salvar</button>
  </div>
